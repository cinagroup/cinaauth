apiVersion: v1
kind: ConfigMap
metadata:
  name: cinaauth-config
  namespace: cinaauth
  labels:
    app.kubernetes.io/name: cinaauth
data:
  # Server
  RUST_LOG: "cinaauth=info,warn"
  PORT: "8080"
  HEALTH_PORT: "8080"

  # Token lifetimes (seconds)
  TOKEN_LIFETIME_SECS: "3600"
  REFRESH_TOKEN_LIFETIME_SECS: "604800"

  # Storage backend — set DATABASE_URL in the Secret
  STORAGE_BACKEND: "postgres"

  # Environment tag shown in health responses
  ENVIRONMENT: "production"
