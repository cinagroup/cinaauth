name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v0.5.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            name: auth-framework-linux-x86_64
            admin_name: auth-framework-admin-linux-x86_64
            ext: tar.gz
            cross: false
            native_musl: false
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            name: auth-framework-linux-x86_64-musl
            admin_name: auth-framework-admin-linux-x86_64-musl
            ext: tar.gz
            cross: true
            native_musl: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            name: auth-framework-linux-aarch64
            admin_name: auth-framework-admin-linux-aarch64
            ext: tar.gz
            cross: false
            native_musl: false
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            name: auth-framework-linux-aarch64-musl
            admin_name: auth-framework-admin-linux-aarch64-musl
            ext: tar.gz
            cross: false
            native_musl: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            name: auth-framework-macos-x86_64
            admin_name: auth-framework-admin-macos-x86_64
            ext: tar.gz
            cross: false
            native_musl: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            name: auth-framework-macos-aarch64
            admin_name: auth-framework-admin-macos-aarch64
            ext: tar.gz
            cross: false
            native_musl: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            name: auth-framework-windows-x86_64
            admin_name: auth-framework-admin-windows-x86_64
            ext: zip
            cross: false
            native_musl: false

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install native musl toolchain
        if: matrix.native_musl
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools pkg-config libssl-dev libpq-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build binaries
        shell: bash
        run: |
          build_release_binary() {
            local features="$1"
            local bin_name="$2"

            if [ "${{ matrix.native_musl }}" = "true" ]; then
              CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc \
              CC_aarch64_unknown_linux_musl=musl-gcc \
              AR_aarch64_unknown_linux_musl=ar \
              PKG_CONFIG_ALLOW_CROSS=1 \
              cargo build --release --target ${{ matrix.target }} --features "$features" --bin "$bin_name"
            elif [ "${{ matrix.cross }}" = "true" ]; then
              cross build --release --target ${{ matrix.target }} --features "$features" --bin "$bin_name"
            else
              cargo build --release --target ${{ matrix.target }} --features "$features" --bin "$bin_name"
            fi
          }

          build_release_binary "api-server,postgres-storage" "auth-framework"
          build_release_binary "admin-binary" "auth-framework-admin"

      - name: Archive binaries
        shell: bash
        run: |
          archive_binary() {
            local bin_name="$1"
            local asset_name="$2"

            if [ "${{ matrix.runner }}" = "windows-latest" ]; then
              cp target/${{ matrix.target }}/release/${bin_name}.exe ${asset_name}.exe
              7z a ${asset_name}.${{ matrix.ext }} ${asset_name}.exe README.md LICENSE-MIT LICENSE-APACHE
              certutil -hashfile ${asset_name}.${{ matrix.ext }} SHA256 > ${asset_name}.${{ matrix.ext }}.sha256
              rm -f ${asset_name}.exe
            else
              cp target/${{ matrix.target }}/release/${bin_name} ${asset_name}
              tar czf ${asset_name}.${{ matrix.ext }} ${asset_name} README.md LICENSE-MIT LICENSE-APACHE
              shasum -a 256 ${asset_name}.${{ matrix.ext }} > ${asset_name}.${{ matrix.ext }}.sha256
              rm -f ${asset_name}
            fi
          }

          archive_binary auth-framework ${{ matrix.name }}
          archive_binary auth-framework-admin ${{ matrix.admin_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.name }}
          path: |
            ${{ matrix.name }}.${{ matrix.ext }}
            ${{ matrix.name }}.${{ matrix.ext }}.sha256
            ${{ matrix.admin_name }}.${{ matrix.ext }}
            ${{ matrix.admin_name }}.${{ matrix.ext }}.sha256
          retention-days: 1

  build-docker:
    name: Build Docker image (${{ matrix.platform }})
    needs: build-binaries
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            artifact_name: binary-auth-framework-linux-x86_64-musl
            archive_name: auth-framework-linux-x86_64-musl.tar.gz
            binary_name: auth-framework-linux-x86_64-musl
            digest_artifact: docker-digest-linux-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            artifact_name: binary-auth-framework-linux-aarch64-musl
            archive_name: auth-framework-linux-aarch64-musl.tar.gz
            binary_name: auth-framework-linux-aarch64-musl
            digest_artifact: docker-digest-linux-arm64

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download runtime artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: docker/.release-binary/dist

      - name: Prepare runtime binary
        shell: bash
        run: |
          rm -f docker/.release-binary/auth-framework
          tar xzf docker/.release-binary/dist/${{ matrix.archive_name }} -C docker/.release-binary/dist
          cp docker/.release-binary/dist/${{ matrix.binary_name }} docker/.release-binary/auth-framework
          chmod +x docker/.release-binary/auth-framework

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.get_version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.get_version.outputs.version }}
            type=semver,pattern={{major}},value=${{ steps.get_version.outputs.version }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./docker
          file: ./docker/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true

      - name: Export image digest
        shell: bash
        run: |
          mkdir -p $RUNNER_TEMP/digests
          digest=${{ steps.build.outputs.digest }}
          touch $RUNNER_TEMP/digests/${digest#sha256:}

      - name: Upload image digest
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.digest_artifact }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-docker:
    name: Publish Docker manifest
    needs: build-docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.get_version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.get_version.outputs.version }}
            type=semver,pattern={{major}},value=${{ steps.get_version.outputs.version }}

      - name: Download image digests
        uses: actions/download-artifact@v4
        with:
          pattern: docker-digest-*
          merge-multiple: true
          path: ${{ runner.temp }}/digests

      - name: Create manifest list
        working-directory: ${{ runner.temp }}/digests
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
        shell: bash
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository }}@sha256:%s ' *)

      - name: Inspect published manifest
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
        shell: bash
        run: |
          docker buildx imagetools inspect $(jq -r '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON")

  publish-release:
    needs: [build-binaries, merge-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        uses: orhun/git-cliff-action@v3
        id: git-cliff
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: AuthFramework ${{ steps.get_version.outputs.version }}
          body_path: CHANGELOG.md
          draft: false
          fail_on_unmatched_files: false
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
