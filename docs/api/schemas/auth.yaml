# Authentication Schemas
# Data structures for authentication and token management

LoginRequest:
    type: object
    description: User login credentials
    properties:
        username:
            type: string
            description: Username or email address
            example: "user@example.com"
        password:
            type: string
            format: password
            description: User password
            example: "SecurePassword123!"
        remember_me:
            type: boolean
            description: Whether to extend session duration
            default: false
        mfa_code:
            type: string
            description: Multi-factor authentication code (if MFA is enabled)
            example: "123456"
            pattern: "^[0-9]{6}$"
    required:
        - username
        - password

LoginResponse:
    type: object
    description: Successful login response with tokens
    properties:
        access_token:
            type: string
            description: JWT access token
            example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        refresh_token:
            type: string
            description: JWT refresh token for obtaining new access tokens
            example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        token_type:
            type: string
            description: Token type (always "Bearer")
            example: "Bearer"
        expires_in:
            type: integer
            description: Access token lifetime in seconds
            example: 3600
            minimum: 1
        user:
            $ref: "#/UserInfo"
    required:
        - access_token
        - refresh_token
        - token_type
        - expires_in
        - user

RefreshTokenRequest:
    type: object
    description: Request to refresh an access token
    properties:
        refresh_token:
            type: string
            description: Valid refresh token
            example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
    required:
        - refresh_token

TokenResponse:
    type: object
    description: Token response for refresh and OAuth operations
    properties:
        access_token:
            type: string
            description: JWT access token
            example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        token_type:
            type: string
            description: Token type (always "Bearer")
            example: "Bearer"
        expires_in:
            type: integer
            description: Access token lifetime in seconds
            example: 3600
            minimum: 1
        refresh_token:
            type: string
            description: New refresh token (optional)
            example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
    required:
        - access_token
        - token_type
        - expires_in

UserInfo:
    type: object
    description: Basic user information included in token responses
    properties:
        id:
            type: string
            format: uuid
            description: Unique user identifier
            example: "123e4567-e89b-12d3-a456-426614174000"
        username:
            type: string
            description: Username
            example: "user@example.com"
        email:
            type: string
            format: email
            description: User email address
            example: "user@example.com"
        roles:
            type: array
            description: User roles
            items:
                type: string
            example: ["user", "developer"]
        permissions:
            type: array
            description: User permissions
            items:
                type: string
            example: ["read:profile", "write:profile"]
        mfa_enabled:
            type: boolean
            description: Whether MFA is enabled for this user
            example: false
        created_at:
            type: string
            format: date-time
            description: Account creation timestamp
            example: "2024-01-20T15:30:45Z"
        last_login:
            type: string
            format: date-time
            nullable: true
            description: Last login timestamp
            example: "2024-01-20T15:30:45Z"
    required:
        - id
        - username
        - email
        - roles
        - mfa_enabled
        - created_at

TokenValidationResponse:
    type: object
    description: Token validation result
    properties:
        valid:
            type: boolean
            description: Whether the token is valid
            example: true
        user:
            $ref: "#/UserInfo"
        expires_at:
            type: string
            format: date-time
            description: Token expiration timestamp
            example: "2024-01-20T16:30:45Z"
    required:
        - valid
