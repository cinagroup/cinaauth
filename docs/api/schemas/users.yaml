# User Management Schemas

UserProfile:
    type: object
    description: Full profile payload returned by /users/profile and /users/{user_id}/profile
    properties:
        id:
            type: string
            description: Unique user identifier
            example: "user_123"
        username:
            type: string
            example: "user@example.com"
        email:
            type: string
            format: email
            example: "user@example.com"
        first_name:
            type: string
            nullable: true
            example: "Jane"
        last_name:
            type: string
            nullable: true
            example: "Doe"
        roles:
            type: array
            items:
                type: string
            example: ["user"]
        permissions:
            type: array
            items:
                type: string
            example: ["profile:read", "profile:write"]
        mfa_enabled:
            type: boolean
            example: true
        email_verified:
            type: boolean
            example: true
        created_at:
            type: string
            format: date-time
            example: "2026-01-20T15:30:45Z"
        updated_at:
            type: string
            format: date-time
            example: "2026-01-20T15:45:10Z"
    required:
        - id
        - username
        - email
        - roles
        - permissions
        - mfa_enabled
        - email_verified
        - created_at
        - updated_at

UpdateProfileRequest:
    type: object
    description: Request body for PUT /users/profile
    properties:
        first_name:
            type: string
            nullable: true
            example: "Jane"
        last_name:
            type: string
            nullable: true
            example: "Doe"
        email:
            type: string
            format: email
            nullable: true
            example: "jane.doe@example.com"

ChangePasswordRequest:
    type: object
    description: Request body for POST /users/change-password
    properties:
        current_password:
            type: string
            format: password
            example: "CurrentPassword123!"
        new_password:
            type: string
            format: password
            example: "NewSecurePassword123!"
    required:
        - current_password
        - new_password

SessionInfo:
    type: object
    description: One active session entry returned by /users/sessions
    properties:
        id:
            type: string
            example: "session_123"
        device:
            type: string
            example: "Mozilla/5.0 (...)"
        location:
            type: string
            example: ""
        ip_address:
            type: string
            example: "203.0.113.10"
        created_at:
            type: string
            format: date-time
            example: "2026-01-20T15:30:45Z"
        last_active:
            type: string
            format: date-time
            example: "2026-01-20T15:45:10Z"
        is_current:
            type: boolean
            example: false
    required:
        - id
        - device
        - location
        - ip_address
        - created_at
        - last_active
        - is_current

UserListItem:
    type: object
    description: One admin user-list entry
    properties:
        id:
            type: string
            example: "user_123"
        username:
            type: string
            example: "user@example.com"
        email:
            type: string
            format: email
            example: "user@example.com"
        roles:
            type: array
            items:
                type: string
            example: ["user"]
        active:
            type: boolean
            example: true
        created_at:
            type: string
            format: date-time
            example: "2026-01-20T15:30:45Z"
        last_login:
            type: string
            format: date-time
            nullable: true
            description: Present only when the stored user JSON includes a last_login value
    required:
        - id
        - username
        - email
        - roles
        - active
        - created_at

UserListResponse:
    type: object
    properties:
        users:
            type: array
            items:
                $ref: "#/UserListItem"
        pagination:
            type: object
            properties:
                page:
                    type: integer
                limit:
                    type: integer
                total:
                    type: integer
                pages:
                    type: integer
            required:
                - page
                - limit
                - total
                - pages
    required:
        - users
        - pagination

CreateUserRequest:
    type: object
    description: Request body for POST /admin/users
    properties:
        username:
            type: string
            example: "newuser"
        password:
            type: string
            format: password
            example: "SecurePassword123!"
        email:
            type: string
            format: email
            example: "newuser@example.com"
        first_name:
            type: string
            nullable: true
            example: "New"
        last_name:
            type: string
            nullable: true
            example: "User"
        roles:
            type: array
            items:
                type: string
            example: ["user"]
        active:
            type: boolean
            default: true
    required:
        - username
        - password
        - email

UpdateUserRolesRequest:
    type: object
    description: Request body for PUT /admin/users/{user_id}/roles
    properties:
        roles:
            type: array
            items:
                type: string
            example: ["admin", "user"]
    required:
        - roles

ActivateUserRequest:
    type: object
    description: Request body for PUT /admin/users/{user_id}/activate
    properties:
        active:
            type: boolean
            example: false
    required:
        - active