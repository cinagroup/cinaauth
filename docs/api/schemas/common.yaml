# Common Schemas
# Base response types and common data structures used across all endpoints

ApiResponse:
    type: object
    description: Standard success response wrapper
    properties:
        success:
            type: boolean
            description: Indicates whether the request was successful
            example: true
        data:
            type: object
            description: Response payload (structure varies by endpoint)
        timestamp:
            type: string
            format: date-time
            description: ISO 8601 timestamp of the response
            example: "2024-01-20T15:30:45Z"
    required:
        - success
        - timestamp

ApiError:
    type: object
    description: Standard error response wrapper
    properties:
        success:
            type: boolean
            description: Always false for error responses
            example: false
        error:
            type: object
            description: Error details
            properties:
                code:
                    type: string
                    description: Machine-readable error code
                    example: "INVALID_CREDENTIALS"
                message:
                    type: string
                    description: Human-readable error message
                    example: "The provided credentials are invalid"
                details:
                    type: object
                    nullable: true
                    description: Additional error context (structure varies by error type)
            required:
                - code
                - message
        timestamp:
            type: string
            format: date-time
            description: ISO 8601 timestamp of the error
            example: "2024-01-20T15:30:45Z"
    required:
        - success
        - error
        - timestamp

Pagination:
    type: object
    description: Pagination metadata for list responses
    properties:
        page:
            type: integer
            description: Current page number (1-based)
            example: 1
            minimum: 1
        limit:
            type: integer
            description: Number of items per page
            example: 20
            minimum: 1
            maximum: 100
        total:
            type: integer
            description: Total number of items across all pages
            example: 150
            minimum: 0
        total_pages:
            type: integer
            description: Total number of pages
            example: 8
            minimum: 0
        has_next:
            type: boolean
            description: Whether there is a next page
            example: true
        has_prev:
            type: boolean
            description: Whether there is a previous page
            example: false
    required:
        - page
        - limit
        - total
        - total_pages
        - has_next
        - has_prev

PaginatedResponse:
    allOf:
        - $ref: "#/ApiResponse"
        - type: object
          properties:
              data:
                  type: object
                  properties:
                      items:
                          type: array
                          description: Array of items for current page
                          items:
                              type: object
                      pagination:
                          $ref: "#/Pagination"
                  required:
                      - items
                      - pagination
