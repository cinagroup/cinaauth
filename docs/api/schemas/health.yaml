# Health Schemas

HealthStatus:
    type: object
    description: Payload returned in ApiResponse.data by GET /health.
    properties:
        status:
            type: string
            enum:
                - healthy
                - degraded
            example: "healthy"
        timestamp:
            type: string
            format: date-time
            example: "2026-01-20T15:30:45Z"
        services:
            type: object
            additionalProperties:
                type: string
            example:
                auth_framework: "healthy"
                storage: "healthy"
                token_manager: "healthy"
                memory: "healthy"
        version:
            type: string
            example: "0.5.0-rc22"
        uptime:
            type: string
            example: "3h 12m 4s"
    required:
        - status
        - timestamp
        - services
        - version
        - uptime

ReadinessStatus:
    type: string
    description: GET /readiness currently returns plain-text "Ready" or "Not Ready", not a JSON object.
    example: "Ready"

LivenessStatus:
    type: string
    description: GET /liveness currently returns plain-text "Alive".
    example: "Alive"

DetailedHealthStatus:
    type: object
    description: Payload returned in ApiResponse.data by GET /health/detailed.
    properties:
        status:
            type: string
            enum:
                - healthy
                - degraded
            example: "healthy"
        timestamp:
            type: string
            format: date-time
            example: "2026-01-20T15:30:45Z"
        services:
            type: object
            additionalProperties:
                $ref: "#/ServiceHealth"
        system:
            $ref: "#/SystemHealth"
        version:
            type: string
            example: "0.5.0-rc22"
        uptime:
            type: string
            example: "3h 12m 4s"
    required:
        - status
        - timestamp
        - services
        - system
        - version
        - uptime

ServiceHealth:
    type: object
    description: Per-service health details in GET /health/detailed.
    properties:
        status:
            type: string
            enum:
                - healthy
                - degraded
                - unhealthy
            example: "healthy"
        response_time_ms:
            type: integer
            minimum: 0
            example: 5
        last_check:
            type: string
            format: date-time
            example: "2026-01-20T15:30:45Z"
        error:
            type: string
            nullable: true
            example: null
        details:
            type: object
            additionalProperties: true
    required:
        - status
        - response_time_ms
        - last_check
        - details

SystemHealth:
    type: object
    properties:
        memory_usage:
            $ref: "#/MemoryInfo"
        cpu_usage:
            type: number
            example: 12.5
        disk_usage:
            $ref: "#/DiskInfo"
        network:
            $ref: "#/NetworkInfo"
    required:
        - memory_usage
        - cpu_usage
        - disk_usage
        - network

MemoryInfo:
    type: object
    properties:
        total_mb:
            type: integer
            example: 16384
        used_mb:
            type: integer
            example: 8192
        free_mb:
            type: integer
            example: 8192
        usage_percent:
            type: number
            example: 50.0
    required:
        - total_mb
        - used_mb
        - free_mb
        - usage_percent

DiskInfo:
    type: object
    properties:
        total_gb:
            type: integer
            example: 512
        used_gb:
            type: integer
            example: 128
        free_gb:
            type: integer
            example: 384
        usage_percent:
            type: number
            example: 25.0
    required:
        - total_gb
        - used_gb
        - free_gb
        - usage_percent

NetworkInfo:
    type: object
    properties:
        requests_per_minute:
            type: integer
            example: 42
        active_connections:
            type: integer
            example: 8
        bytes_sent:
            type: integer
            example: 102400
        bytes_received:
            type: integer
            example: 204800
    required:
        - requests_per_minute
        - active_connections
        - bytes_sent
        - bytes_received