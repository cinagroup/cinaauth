# Health Schemas
# Data structures for health check and monitoring endpoints

HealthStatus:
    type: object
    description: Basic health check response
    properties:
        status:
            type: string
            enum: [healthy, unhealthy, degraded]
            description: Overall service health status
            example: "healthy"
        timestamp:
            type: string
            format: date-time
            description: Timestamp of health check
            example: "2024-01-20T15:30:45Z"
    required:
        - status
        - timestamp

ReadinessStatus:
    type: object
    description: Service readiness check response
    properties:
        ready:
            type: boolean
            description: Whether the service is ready to accept requests
            example: true
        checks:
            type: object
            description: Individual readiness checks
            properties:
                database:
                    type: boolean
                    example: true
                cache:
                    type: boolean
                    example: true
                dependencies:
                    type: boolean
                    example: true
        timestamp:
            type: string
            format: date-time
            example: "2024-01-20T15:30:45Z"
    required:
        - ready
        - checks
        - timestamp

LivenessStatus:
    type: object
    description: Service liveness check response
    properties:
        alive:
            type: boolean
            description: Whether the service is alive
            example: true
        timestamp:
            type: string
            format: date-time
            example: "2024-01-20T15:30:45Z"
    required:
        - alive
        - timestamp

DetailedHealthStatus:
    type: object
    description: Detailed health status with dependency information
    properties:
        status:
            type: string
            enum: [healthy, unhealthy, degraded]
            description: Overall service health status
            example: "healthy"
        services:
            type: object
            description: Health status of individual service dependencies
            properties:
                database:
                    $ref: "#/ServiceHealth"
                cache:
                    $ref: "#/ServiceHealth"
                storage:
                    $ref: "#/ServiceHealth"
        uptime:
            type: integer
            description: Service uptime in seconds
            example: 86400
            minimum: 0
        version:
            type: string
            description: Service version
            example: "1.0.0"
        timestamp:
            type: string
            format: date-time
            example: "2024-01-20T15:30:45Z"
    required:
        - status
        - services
        - uptime
        - version
        - timestamp

ServiceHealth:
    type: object
    description: Health status of an individual service dependency
    properties:
        status:
            type: string
            enum: [healthy, unhealthy, degraded]
            description: Service health status
            example: "healthy"
        response_time:
            type: number
            description: Response time in milliseconds
            example: 12.5
            minimum: 0
        last_check:
            type: string
            format: date-time
            description: Timestamp of last health check
            example: "2024-01-20T15:30:45Z"
        error:
            type: string
            nullable: true
            description: Error message if service is unhealthy
            example: null
    required:
        - status
        - response_time
        - last_check
