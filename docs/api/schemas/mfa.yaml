# Multi-Factor Authentication Schemas

MFASetupResponse:
    type: object
    description: Response body returned by POST /mfa/setup.
    properties:
        qr_code:
            type: string
            description: otpauth:// URI that the client can render as a QR code.
            example: "otpauth://totp/Cinaauth:user_123?secret=JBSWY3DPEHPK3PXP&issuer=Cinaauth&digits=6&period=30"
        secret:
            type: string
            description: Base32-encoded TOTP secret for manual entry.
            example: "JBSWY3DPEHPK3PXP"
        backup_codes:
            type: array
            description: One-time recovery codes shown once during enrollment.
            items:
                type: string
            example:
                ["ABCD2345", "EFGH6789", "JKLM2345", "NPQR6789"]
    required:
        - qr_code
        - secret
        - backup_codes

MFAVerifyRequest:
    type: object
    description: Request body for POST /mfa/verify.
    properties:
        totp_code:
            type: string
            description: Six-digit TOTP code from the authenticator app.
            example: "123456"
            pattern: "^[0-9]{6}$"
    required:
        - totp_code

DisableMFARequest:
    type: object
    description: Request body for POST /mfa/disable.
    properties:
        password:
            type: string
            format: password
            example: "CurrentPassword123!"
        totp_code:
            type: string
            description: Six-digit TOTP code proving possession of the enrolled authenticator.
            example: "123456"
            pattern: "^[0-9]{6}$"
    required:
        - password
        - totp_code

MFAStatusResponse:
    type: object
    description: Current MFA enrollment state for the authenticated user.
    properties:
        enabled:
            type: boolean
            example: true
        methods:
            type: array
            items:
                type: string
            example: ["totp"]
        backup_codes_remaining:
            type: integer
            minimum: 0
            example: 7
    required:
        - enabled
        - methods
        - backup_codes_remaining

BackupCodeVerifyRequest:
    type: object
    description: Request body for POST /mfa/verify-backup-code.
    properties:
        backup_code:
            type: string
            description: One-time plaintext backup code.
            example: "ABCD2345"
    required:
        - backup_code

BackupCodeList:
    type: array
    description: Plaintext backup codes returned by POST /mfa/regenerate-backup-codes.
    items:
        type: string
    example:
        ["ABCD2345", "EFGH6789", "JKLM2345", "NPQR6789"]