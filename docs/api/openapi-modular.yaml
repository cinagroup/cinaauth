openapi: 3.1.0

info:
    title: AuthFramework REST API
    description: |
        Comprehensive REST API for the AuthFramework authentication and authorization library.

        This API provides complete access to AuthFramework's authentication, authorization,
        user management, multi-factor authentication, OAuth 2.0, OIDC, RBAC, and administrative 
        features through standardized HTTP endpoints.

        ## Version Strategy

        - **Versioned endpoints** (`/api/v1/*`): All functional API endpoints are versioned
          for stability and backward compatibility. Version changes follow semantic versioning.

        - **Unversioned endpoints**: Infrastructure endpoints (`/health`, `/metrics`, `/readiness`, 
          `/liveness`) and OIDC discovery (`/.well-known/*`) remain unversioned for operational 
          stability and spec compliance.

        ## Authentication

        Most endpoints require authentication via Bearer tokens in the Authorization header:
        ```
        Authorization: Bearer <your-access-token>
        ```

        Obtain tokens via:
        - `/api/v1/auth/login` - Username/password authentication
        - `/api/v1/oauth/token` - OAuth 2.0 token endpoint
        - `/api/v1/auth/refresh` - Refresh token flow

        ## Rate Limiting

        API endpoints are rate-limited to prevent abuse:
        - Authentication endpoints: 5 requests per minute per IP
        - Standard endpoints: 100 requests per minute per user
        - Admin endpoints: 50 requests per minute per admin user

        Rate limit information is included in response headers:
        - `X-RateLimit-Limit`: Request limit per time window
        - `X-RateLimit-Remaining`: Remaining requests in current window
        - `X-RateLimit-Reset`: Unix timestamp when rate limit resets

        ## Response Format

        All successful responses use a standard envelope:
        ```json
        {
          "success": true,
          "data": { ... },
          "timestamp": "2024-01-20T15:30:45Z"
        }
        ```

        All error responses use a standard envelope:
        ```json
        {
          "success": false,
          "error": {
            "code": "INVALID_CREDENTIALS",
            "message": "The provided credentials are invalid",
            "details": { ... }
          },
          "timestamp": "2024-01-20T15:30:45Z"
        }
        ```

        ## Pagination

        List endpoints support pagination with query parameters:
        - `page`: Page number (1-based, default: 1)
        - `limit`: Items per page (default: 20, max: 100)
        - `sort`: Sort field and direction (e.g., "created_at:desc")

        Paginated responses include metadata:
        ```json
        {
          "success": true,
          "data": {
            "items": [ ... ],
            "pagination": {
              "page": 1,
              "limit": 20,
              "total": 150,
              "total_pages": 8,
              "has_next": true,
              "has_prev": false
            }
          },
          "timestamp": "2024-01-20T15:30:45Z"
        }
        ```

        ## Feature Flags

        Some endpoints require specific compile-time features:
        - **RBAC endpoints** (`/api/v1/rbac/*`): Requires `enhanced-rbac` feature
        - **API Server**: All endpoints require `api-server` feature

        ## Security

        - **TLS Required**: All endpoints must be accessed over HTTPS in production
        - **CORS**: Configurable CORS policies for web clients
        - **CSRF Protection**: State parameter required for OAuth flows
        - **Rate Limiting**: Automatic rate limiting with backoff
        - **Audit Logging**: All admin and RBAC operations are logged

        ## Standards Compliance

        - **OAuth 2.0**: RFC 6749 (Authorization Framework)
        - **PKCE**: RFC 7636 (Proof Key for Code Exchange)
        - **Token Revocation**: RFC 7009
        - **Token Introspection**: RFC 7662
        - **Token Exchange**: RFC 8693
        - **OpenID Connect**: OIDC Core 1.0
        - **OIDC Discovery**: RFC 8414
        - **JWT**: RFC 7519
        - **JWK**: RFC 7517

