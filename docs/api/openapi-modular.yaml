servers:
    - url: https://api.authframework.dev
      description: Production server
    - url: https://staging-api.authframework.dev
      description: Staging server
    - url: http://localhost:8080
      description: Development server

tags:
    - name: Health
      description: Health monitoring and metrics endpoints (unversioned)
    - name: Authentication
      description: User authentication and token management
    - name: Users
      description: User profile and account management
    - name: MFA
      description: Multi-factor authentication setup and management
    - name: OAuth 2.0
      description: OAuth 2.0 authorization server endpoints (includes advanced RFCs)
    - name: OpenID Connect
      description: OpenID Connect provider endpoints
    - name: Device Flow
      description: OAuth 2.0 Device Authorization Grant (RFC 8628)
    - name: Client Management
      description: Dynamic client registration and management (RFC 7591)
    - name: RBAC
      description: Role-Based Access Control (requires enhanced-rbac feature)
    - name: Admin
      description: Administrative endpoints (requires admin role)
    - name: Security
      description: Advanced security features and threat intelligence
    - name: Health & Monitoring
      description: Extended health checks and dependency monitoring

paths:
    # Infrastructure endpoints (UNVERSIONED)
    /health:
        $ref: "./paths/health.yaml#/health"
    /health/detailed:
        $ref: "./paths/health.yaml#/healthDetailed"
    /health/dependencies:
        $ref: "./paths/health_extended.yaml#/~1api~1v1~1health~1dependencies"
    /readiness:
        $ref: "./paths/health.yaml#/readiness"
    /liveness:
        $ref: "./paths/health.yaml#/liveness"
    /metrics:
        $ref: "./paths/health.yaml#/metrics"

    # OIDC Discovery (UNVERSIONED per spec)
    /.well-known/openid-configuration:
        $ref: "./paths/oauth.yaml#/wellKnownOpenidConfiguration"

    # Authentication endpoints (VERSIONED)
    /api/v1/auth/login:
        $ref: "./paths/auth.yaml#/login"
    /api/v1/auth/refresh:
        $ref: "./paths/auth.yaml#/refresh"
    /api/v1/auth/logout:
        $ref: "./paths/auth.yaml#/logout"
    /api/v1/auth/validate:
        $ref: "./paths/auth.yaml#/validate"

    # User management endpoints (VERSIONED)
    /api/v1/users/profile:
        $ref: "./paths/users.yaml#/profile"
    /api/v1/users/password:
        $ref: "./paths/users.yaml#/password"

    # MFA endpoints (VERSIONED)
    /api/v1/mfa/setup:
        $ref: "./paths/mfa.yaml#/setup"
    /api/v1/mfa/verify:
        $ref: "./paths/mfa.yaml#/verify"
    /api/v1/mfa/disable:
        $ref: "./paths/mfa.yaml#/disable"
    /api/v1/mfa/status:
        $ref: "./paths/mfa.yaml#/status"
    /api/v1/mfa/backup-codes:
        $ref: "./paths/mfa.yaml#/regenerateBackupCodes"

    # OAuth 2.0 endpoints (VERSIONED)
    /api/v1/oauth/authorize:
        $ref: "./paths/oauth.yaml#/authorize"
    /api/v1/oauth/token:
        $ref: "./paths/oauth.yaml#/token"
    /api/v1/oauth/revoke:
        $ref: "./paths/oauth.yaml#/revoke"
    /api/v1/oauth/introspect:
        $ref: "./paths/oauth_advanced.yaml#/~1api~1v1~1oauth~1introspect"
    /api/v1/oauth/token-exchange:
        $ref: "./paths/oauth.yaml#/tokenExchange"

    # OAuth 2.0 Advanced - PAR (RFC 9126)
    /api/v1/oauth/par:
        $ref: "./paths/oauth_advanced.yaml#/~1api~1v1~1oauth~1par"

    # OAuth 2.0 Advanced - Device Flow (RFC 8628)
    /api/v1/oauth/device/code:
        $ref: "./paths/oauth_advanced.yaml#/~1api~1v1~1oauth~1device~1code"
    /api/v1/oauth/device/token:
        $ref: "./paths/oauth_advanced.yaml#/~1api~1v1~1oauth~1device~1token"

    # OAuth 2.0 Advanced - OIDC Logout
    /api/v1/oauth/logout:
        $ref: "./paths/oauth_advanced.yaml#/~1api~1v1~1oauth~1logout"
    /api/v1/oauth/backchannel-logout:
        $ref: "./paths/oauth_advanced.yaml#/~1api~1v1~1oauth~1backchannel-logout"

    # OAuth 2.0 Advanced - Dynamic Client Registration (RFC 7591)
    /api/v1/oauth/register:
        $ref: "./paths/oauth_advanced.yaml#/~1api~1v1~1oauth~1register"
    /api/v1/oauth/register/{client_id}:
        $ref: "./paths/oauth_advanced.yaml#/~1api~1v1~1oauth~1register~1{client_id}"

    # OIDC endpoints (VERSIONED)
    /api/v1/oauth/jwks:
        $ref: "./paths/oauth.yaml#/jwks"
    /api/v1/oauth/userinfo:
        $ref: "./paths/oauth.yaml#/userinfo"

    # Security endpoints (VERSIONED)
    /api/v1/security/check-ip:
        $ref: "./paths/security.yaml#/~1api~1v1~1security~1check-ip"

    # RBAC endpoints (VERSIONED, requires enhanced-rbac feature)
    /api/v1/rbac/roles:
        $ref: "./paths/rbac.yaml#/roles"
    /api/v1/rbac/roles/{role_name}:
        $ref: "./paths/rbac.yaml#/roleById"
    /api/v1/rbac/users/{user_id}/roles:
        $ref: "./paths/rbac.yaml#/userRoles"
    /api/v1/rbac/assign:
        $ref: "./paths/rbac.yaml#/assignUserRole"
    /api/v1/rbac/revoke:
        $ref: "./paths/rbac.yaml#/revokeUserRole"
    /api/v1/rbac/bulk-assign:
        $ref: "./paths/rbac.yaml#/bulkAssignRoles"
    /api/v1/rbac/check-permission:
        $ref: "./paths/rbac.yaml#/checkPermission"
    /api/v1/rbac/elevate:
        $ref: "./paths/rbac.yaml#/elevateRole"
    /api/v1/rbac/audit-logs:
        $ref: "./paths/rbac.yaml#/auditLogs"

    # Admin endpoints (VERSIONED, requires admin role)
    /api/v1/admin/users:
        $ref: "./paths/admin.yaml#/users"
    /api/v1/admin/users/{user_id}:
        $ref: "./paths/admin.yaml#/userById"
    /api/v1/admin/stats:
        $ref: "./paths/admin.yaml#/stats"
    /api/v1/admin/events:
        $ref: "./paths/admin.yaml#/events"
    /api/v1/admin/config:
        $ref: "./paths/admin.yaml#/config"
    /api/v1/admin/backup:
        $ref: "./paths/admin.yaml#/backup"

