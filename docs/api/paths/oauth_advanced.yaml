# OAuth 2.0 Advanced Features - Additional Endpoints
# Includes token introspection, PAR, DPoP, device flow, RAR, and logout endpoints

# ============================================================================
# Token Introspection - RFC 7662
# ============================================================================
/api/v1/oauth/introspect:
    post:
        summary: Introspect OAuth 2.0 Token
        description: |
            RFC 7662 - Token introspection endpoint that allows resource servers 
            to query the authorization server about the state and metadata of a token.

            **Security**: Requires client authentication via Basic Auth or client credentials.
        operationId: introspectToken
        tags:
            - OAuth 2.0
        security:
            - basicAuth: []
            - clientCredentials: []
        requestBody:
            required: true
            content:
                application/x-www-form-urlencoded:
                    schema:
                        type: object
                        required:
                            - token
                        properties:
                            token:
                                type: string
                                description: The token to introspect (access or refresh token)
                                example: "eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9..."
                            token_type_hint:
                                type: string
                                description: Hint about the type of token being introspected
                                enum:
                                    - access_token
                                    - refresh_token
                                example: "access_token"
        responses:
            "200":
                description: Token introspection successful
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - active
                            properties:
                                active:
                                    type: boolean
                                    description: Whether the token is currently active
                                    example: true
                                scope:
                                    type: string
                                    description: Space-separated list of scopes
                                    example: "read write"
                                client_id:
                                    type: string
                                    description: Client identifier
                                    example: "client_123"
                                username:
                                    type: string
                                    description: Username of the resource owner
                                    example: "user@example.com"
                                token_type:
                                    type: string
                                    description: Type of token
                                    example: "Bearer"
                                exp:
                                    type: integer
                                    description: Token expiration timestamp
                                    example: 1735689600
                                iat:
                                    type: integer
                                    description: Token issuance timestamp
                                    example: 1735686000
                                nbf:
                                    type: integer
                                    description: Token not-before timestamp
                                    example: 1735686000
                                sub:
                                    type: string
                                    description: Subject identifier
                                    example: "user_123"
                                aud:
                                    type: string
                                    description: Intended audience
                                    example: "api.example.com"
                                iss:
                                    type: string
                                    description: Issuer identifier
                                    example: "https://auth.example.com"
                                jti:
                                    type: string
                                    description: JWT ID
                                    example: "token_abc123"
            "401":
                $ref: "../components/responses.yaml#/Unauthorized"
            "400":
                $ref: "../components/responses.yaml#/BadRequest"
            "429":
                $ref: "../components/responses.yaml#/RateLimit"

# ============================================================================
# Pushed Authorization Requests - RFC 9126
# ============================================================================
/api/v1/oauth/par:
    post:
        summary: Submit Pushed Authorization Request
        description: |
            RFC 9126 - Allows clients to push the authorization request parameters 
            to the authorization server before initiating the authorization flow.
            Returns a request URI that can be used in the authorization endpoint.

            **Security Benefits**:
            - Prevents authorization request parameter tampering
            - Reduces URL length issues
            - Protects sensitive parameters from browser history
        operationId: pushedAuthorizationRequest
        tags:
            - OAuth 2.0
        security:
            - clientCredentials: []
        requestBody:
            required: true
            content:
                application/x-www-form-urlencoded:
                    schema:
                        type: object
                        required:
                            - response_type
                            - client_id
                            - redirect_uri
                        properties:
                            response_type:
                                type: string
                                description: OAuth response type
                                example: "code"
                            client_id:
                                type: string
                                description: Client identifier
                                example: "client_123"
                            redirect_uri:
                                type: string
                                format: uri
                                description: Callback URI
                                example: "https://app.example.com/callback"
                            scope:
                                type: string
                                description: Space-separated scopes
                                example: "read write"
                            state:
                                type: string
                                description: Client state for CSRF protection
                                example: "random_state_value"
                            code_challenge:
                                type: string
                                description: PKCE code challenge
                                example: "E9Melhoa2OwvFrEMTJguCHaoeK1t8URWbuGJSstw-cM"
                            code_challenge_method:
                                type: string
                                description: PKCE code challenge method
                                enum:
                                    - S256
                                    - plain
                                example: "S256"
                            nonce:
                                type: string
                                description: OIDC nonce for ID token
                                example: "random_nonce_value"
        responses:
            "201":
                description: Authorization request successfully pushed
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - request_uri
                                - expires_in
                            properties:
                                request_uri:
                                    type: string
                                    description: URI referencing the authorization request
                                    example: "urn:ietf:params:oauth:request_uri:6esc_11ACC5bwc014ltc14eY22c"
                                expires_in:
                                    type: integer
                                    description: Lifetime of the request URI in seconds
                                    example: 90
            "400":
                $ref: "../components/responses.yaml#/BadRequest"
            "401":
                $ref: "../components/responses.yaml#/Unauthorized"
            "429":
                $ref: "../components/responses.yaml#/RateLimit"

# ============================================================================
# Device Authorization Grant - RFC 8628
# ============================================================================
/api/v1/oauth/device/code:
    post:
        summary: Request Device Authorization
        description: |
            RFC 8628 - Initiates the device authorization flow for input-constrained devices.
            Returns a device code and user code that the user must enter on another device.

            **Use Cases**: Smart TVs, IoT devices, CLI applications, game consoles
        operationId: deviceAuthorizationRequest
        tags:
            - OAuth 2.0
            - Device Flow
        requestBody:
            required: true
            content:
                application/x-www-form-urlencoded:
                    schema:
                        type: object
                        required:
                            - client_id
                        properties:
                            client_id:
                                type: string
                                description: Client identifier
                                example: "cli_app_123"
                            scope:
                                type: string
                                description: Space-separated scopes
                                example: "read write"
        responses:
            "200":
                description: Device authorization initiated
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - device_code
                                - user_code
                                - verification_uri
                                - expires_in
                            properties:
                                device_code:
                                    type: string
                                    description: Device verification code (client keeps polling with this)
                                    example: "GmRhmhcxhwAzkoEqiMEg_DnyEysNkuNhszIySk9eS"
                                user_code:
                                    type: string
                                    description: End-user verification code (user types this)
                                    example: "WDJB-MJHT"
                                verification_uri:
                                    type: string
                                    format: uri
                                    description: URI where user should enter the user code
                                    example: "https://auth.example.com/device"
                                verification_uri_complete:
                                    type: string
                                    format: uri
                                    description: Complete URI with user code (for QR codes)
                                    example: "https://auth.example.com/device?user_code=WDJB-MJHT"
                                expires_in:
                                    type: integer
                                    description: Device code lifetime in seconds
                                    example: 1800
                                interval:
                                    type: integer
                                    description: Minimum polling interval in seconds
                                    example: 5
            "400":
                $ref: "../components/responses.yaml#/BadRequest"
            "429":
                $ref: "../components/responses.yaml#/RateLimit"

/api/v1/oauth/device/token:
    post:
        summary: Poll for Device Authorization Token
        description: |
            RFC 8628 - Client polls this endpoint to check if the user has completed 
            authorization. Must respect the polling interval to avoid rate limiting.

            **Error Codes**:
            - `authorization_pending`: User hasn't completed authorization yet
            - `slow_down`: Client is polling too frequently
            - `access_denied`: User denied the request
            - `expired_token`: Device code expired
        operationId: deviceTokenPoll
        tags:
            - OAuth 2.0
            - Device Flow
        requestBody:
            required: true
            content:
                application/x-www-form-urlencoded:
                    schema:
                        type: object
                        required:
                            - grant_type
                            - device_code
                            - client_id
                        properties:
                            grant_type:
                                type: string
                                description: Must be "urn:ietf:params:oauth:grant-type:device_code"
                                example: "urn:ietf:params:oauth:grant-type:device_code"
                            device_code:
                                type: string
                                description: Device code from authorization request
                                example: "GmRhmhcxhwAzkoEqiMEg_DnyEysNkuNhszIySk9eS"
                            client_id:
                                type: string
                                description: Client identifier
                                example: "cli_app_123"
        responses:
            "200":
                description: Authorization complete, tokens issued
                content:
                    application/json:
                        schema:
                            $ref: "../schemas/oauth.yaml#/TokenResponse"
            "400":
                description: Authorization pending or error
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                - error
                            properties:
                                error:
                                    type: string
                                    enum:
                                        - authorization_pending
                                        - slow_down
                                        - access_denied
                                        - expired_token
                                    example: "authorization_pending"
                                error_description:
                                    type: string
                                    example: "User has not yet completed authorization"
                                interval:
                                    type: integer
                                    description: New polling interval (for slow_down error)
                                    example: 10
            "429":
                $ref: "../components/responses.yaml#/RateLimit"

# ============================================================================
# OIDC Logout Endpoints
# ============================================================================
/api/v1/oauth/logout:
    get:
        summary: OIDC Front-Channel Logout
        description: |
            OpenID Connect Front-Channel Logout - Initiates logout flow that 
            terminates the user's session across all participating clients.

            **Use Cases**: Enterprise SSO, coordinated logout across multiple applications
        operationId: frontChannelLogout
        tags:
            - OAuth 2.0
            - OpenID Connect
        parameters:
            - name: id_token_hint
              in: query
              required: false
              schema:
                  type: string
              description: ID token hint to identify the session
              example: "eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9..."
            - name: post_logout_redirect_uri
              in: query
              required: false
              schema:
                  type: string
                  format: uri
              description: Where to redirect after logout
              example: "https://app.example.com/logged-out"
            - name: state
              in: query
              required: false
              schema:
                  type: string
              description: Client state value
              example: "random_state_value"
        responses:
            "302":
                description: Redirects to post_logout_redirect_uri or confirmation page
            "400":
                $ref: "../components/responses.yaml#/BadRequest"

/api/v1/oauth/backchannel-logout:
    post:
        summary: OIDC Back-Channel Logout
        description: |
            OpenID Connect Back-Channel Logout - Server-to-server logout notification.
            The authorization server POSTs logout tokens to registered client endpoints.

            **Security**: Validates logout token JWT signature
        operationId: backChannelLogout
        tags:
            - OAuth 2.0
            - OpenID Connect
        requestBody:
            required: true
            content:
                application/x-www-form-urlencoded:
                    schema:
                        type: object
                        required:
                            - logout_token
                        properties:
                            logout_token:
                                type: string
                                description: JWT logout token
                                example: "eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9..."
        responses:
            "200":
                description: Logout processed successfully
                content:
                    application/json:
                        schema:
                            $ref: "../schemas/common.yaml#/ApiResponse"
            "400":
                $ref: "../components/responses.yaml#/BadRequest"
            "401":
                $ref: "../components/responses.yaml#/Unauthorized"

# ============================================================================
# Dynamic Client Registration - RFC 7591
# ============================================================================
/api/v1/oauth/register:
    post:
        summary: Register OAuth Client
        description: |
            RFC 7591 - Dynamically register a new OAuth 2.0 client with the authorization server.

            **Security**: Requires initial registration token or public registration must be enabled.
            **Use Cases**: SaaS platforms, multi-tenant applications, developer portals
        operationId: registerClient
        tags:
            - OAuth 2.0
            - Client Management
        security:
            - bearerAuth: []
            - registrationToken: []
            - {} # Allow unauthenticated if public registration enabled
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        $ref: "../schemas/oauth.yaml#/ClientRegistrationRequest"
        responses:
            "201":
                description: Client registered successfully
                content:
                    application/json:
                        schema:
                            $ref: "../schemas/oauth.yaml#/ClientRegistrationResponse"
            "400":
                $ref: "../components/responses.yaml#/BadRequest"
            "401":
                $ref: "../components/responses.yaml#/Unauthorized"
            "429":
                $ref: "../components/responses.yaml#/RateLimit"

/api/v1/oauth/register/{client_id}:
    get:
        summary: Get OAuth Client Configuration
        description: |
            RFC 7591 - Retrieve the current configuration of a dynamically registered client.

            **Security**: Requires registration access token from registration response.
        operationId: getClientConfiguration
        tags:
            - OAuth 2.0
            - Client Management
        security:
            - bearerAuth: []
        parameters:
            - $ref: "../components/parameters.yaml#/ClientId"
        responses:
            "200":
                description: Client configuration retrieved
                content:
                    application/json:
                        schema:
                            $ref: "../schemas/oauth.yaml#/ClientRegistrationResponse"
            "401":
                $ref: "../components/responses.yaml#/Unauthorized"
            "404":
                $ref: "../components/responses.yaml#/NotFound"

    put:
        summary: Update OAuth Client Configuration
        description: |
            RFC 7591 - Update the configuration of a dynamically registered client.

            **Security**: Requires registration access token. Cannot update all fields.
        operationId: updateClientConfiguration
        tags:
            - OAuth 2.0
            - Client Management
        security:
            - bearerAuth: []
        parameters:
            - $ref: "../components/parameters.yaml#/ClientId"
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        $ref: "../schemas/oauth.yaml#/ClientRegistrationRequest"
        responses:
            "200":
                description: Client updated successfully
                content:
                    application/json:
                        schema:
                            $ref: "../schemas/oauth.yaml#/ClientRegistrationResponse"
            "400":
                $ref: "../components/responses.yaml#/BadRequest"
            "401":
                $ref: "../components/responses.yaml#/Unauthorized"
            "404":
                $ref: "../components/responses.yaml#/NotFound"

    delete:
        summary: Delete OAuth Client
        description: |
            RFC 7591 - Delete a dynamically registered client.

            **Security**: Requires registration access token. Revokes all tokens.
        operationId: deleteClient
        tags:
            - OAuth 2.0
            - Client Management
        security:
            - bearerAuth: []
        parameters:
            - $ref: "../components/parameters.yaml#/ClientId"
        responses:
            "204":
                description: Client deleted successfully
            "401":
                $ref: "../components/responses.yaml#/Unauthorized"
            "404":
                $ref: "../components/responses.yaml#/NotFound"
