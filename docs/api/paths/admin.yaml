# Administrative Endpoints
# System administration and management (requires admin role)
# All admin endpoints are under /api/v1/admin

users:
    get:
        tags:
            - Admin
        summary: List all users (admin)
        description: |
            Get paginated list of all users in the system. Supports filtering by status, 
            role, email verification, and MFA status. Includes full user details.
        operationId: listUsers
        security:
            - bearerAuth: []
        parameters:
            - $ref: "../components/parameters.yaml#/PageParam"
            - $ref: "../components/parameters.yaml#/LimitParam"
            - $ref: "../components/parameters.yaml#/SortParam"
            - name: status
              in: query
              description: Filter by account status
              schema:
                  type: string
                  enum: [active, suspended, locked, deleted]
              example: "active"
            - name: role
              in: query
              description: Filter by role name
              schema:
                  type: string
              example: "admin"
            - name: mfa_enabled
              in: query
              description: Filter by MFA status
              schema:
                  type: boolean
              example: true
            - name: email_verified
              in: query
              description: Filter by email verification status
              schema:
                  type: boolean
              example: true
            - name: search
              in: query
              description: Search by username or email
              schema:
                  type: string
              example: "john"
        responses:
            "200":
                description: List of users
                content:
                    application/json:
                        schema:
                            $ref: "../schemas/users.yaml#/UserListResponse"
            "401":
                $ref: "../components/responses.yaml#/Unauthorized"
            "403":
                $ref: "../components/responses.yaml#/Forbidden"

    post:
        tags:
            - Admin
        summary: Create new user (admin)
        description: |
            Create a new user account with specified roles and settings. Optionally send 
            welcome email with account setup instructions.
        operationId: createUser
        security:
            - bearerAuth: []
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        $ref: "../schemas/users.yaml#/CreateUserRequest"
        responses:
            "201":
                description: User created successfully
                content:
                    application/json:
                        schema:
                            allOf:
                                - $ref: "../schemas/common.yaml#/ApiResponse"
                                - type: object
                                  properties:
                                      data:
                                          $ref: "../schemas/users.yaml#/UserProfile"
            "400":
                $ref: "../components/responses.yaml#/BadRequest"
            "401":
                $ref: "../components/responses.yaml#/Unauthorized"
            "403":
                $ref: "../components/responses.yaml#/Forbidden"
            "409":
                description: Username or email already exists
                content:
                    application/json:
                        schema:
                            $ref: "../components/responses.yaml#/Conflict"

userById:
    get:
        tags:
            - Admin
        summary: Get user details (admin)
        description: Get complete details of a specific user including roles, sessions, and audit trail
        operationId: getUser
        security:
            - bearerAuth: []
        parameters:
            - name: user_id
              in: path
              required: true
              description: User identifier
              schema:
                  type: string
                  format: uuid
              example: "123e4567-e89b-12d3-a456-426614174000"
        responses:
            "200":
                description: User details
                content:
                    application/json:
                        schema:
                            allOf:
                                - $ref: "../schemas/common.yaml#/ApiResponse"
                                - type: object
                                  properties:
                                      data:
                                          allOf:
                                              - $ref: "../schemas/users.yaml#/UserProfile"
                                              - type: object
                                                properties:
                                                    active_sessions:
                                                        type: integer
                                                        description: Number of active sessions
                                                        example: 3
                                                    failed_login_attempts:
                                                        type: integer
                                                        description: Recent failed login attempts
                                                        example: 0
                                                    last_password_change:
                                                        type: string
                                                        format: date-time
                                                        description: Last password change timestamp
                                                        example: "2024-01-15T10:20:30Z"
            "401":
                $ref: "../components/responses.yaml#/Unauthorized"
            "403":
                $ref: "../components/responses.yaml#/Forbidden"
            "404":
                $ref: "../components/responses.yaml#/NotFound"

    patch:
        tags:
            - Admin
        summary: Update user (admin)
        description: |
            Update user account details including email, roles, and account status.
            Can be used to suspend, lock, or reactivate accounts.
        operationId: updateUser
        security:
            - bearerAuth: []
        parameters:
            - name: user_id
              in: path
              required: true
              description: User identifier
              schema:
                  type: string
                  format: uuid
              example: "123e4567-e89b-12d3-a456-426614174000"
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        $ref: "../schemas/users.yaml#/UpdateUserRequest"
        responses:
            "200":
                description: User updated successfully
                content:
                    application/json:
                        schema:
                            allOf:
                                - $ref: "../schemas/common.yaml#/ApiResponse"
                                - type: object
                                  properties:
                                      data:
                                          $ref: "../schemas/users.yaml#/UserProfile"
            "400":
                $ref: "../components/responses.yaml#/BadRequest"
            "401":
                $ref: "../components/responses.yaml#/Unauthorized"
            "403":
                $ref: "../components/responses.yaml#/Forbidden"
            "404":
                $ref: "../components/responses.yaml#/NotFound"

    delete:
        tags:
            - Admin
        summary: Delete user (admin)
        description: |
            Delete user account. This action is irreversible. Optionally perform soft delete 
            (mark as deleted) or hard delete (permanent removal). All user sessions are 
            immediately terminated.
        operationId: deleteUser
        security:
            - bearerAuth: []
        parameters:
            - name: user_id
              in: path
              required: true
              description: User identifier
              schema:
                  type: string
                  format: uuid
              example: "123e4567-e89b-12d3-a456-426614174000"
            - name: hard_delete
              in: query
              description: Perform permanent deletion (cannot be undone)
              schema:
                  type: boolean
                  default: false
        responses:
            "200":
                description: User deleted successfully
                content:
                    application/json:
                        schema:
                            allOf:
                                - $ref: "../schemas/common.yaml#/ApiResponse"
                                - type: object
                                  properties:
                                      data:
                                          type: object
                                          properties:
                                              message:
                                                  type: string
                                                  example: "User deleted successfully"
                                              sessions_terminated:
                                                  type: integer
                                                  description: Number of active sessions terminated
                                                  example: 2
            "401":
                $ref: "../components/responses.yaml#/Unauthorized"
            "403":
                $ref: "../components/responses.yaml#/Forbidden"
            "404":
                $ref: "../components/responses.yaml#/NotFound"

stats:
    get:
        tags:
            - Admin
        summary: Get system statistics (admin)
        description: |
            Get comprehensive system-wide statistics including users, sessions, OAuth, 
            RBAC, security metrics, and system health. Useful for monitoring dashboards.
        operationId: getSystemStats
        security:
            - bearerAuth: []
        responses:
            "200":
                description: System statistics
                content:
                    application/json:
                        schema:
                            allOf:
                                - $ref: "../schemas/common.yaml#/ApiResponse"
                                - type: object
                                  properties:
                                      data:
                                          $ref: "../schemas/admin.yaml#/SystemStats"
            "401":
                $ref: "../components/responses.yaml#/Unauthorized"
            "403":
                $ref: "../components/responses.yaml#/Forbidden"

events:
    get:
        tags:
            - Admin
        summary: Get system event logs (admin)
        description: |
            Retrieve paginated system event logs. Includes authentication events, security 
            alerts, system errors, and audit trail. Supports filtering by level, category, 
            and date range.
        operationId: getSystemEvents
        security:
            - bearerAuth: []
        parameters:
            - $ref: "../components/parameters.yaml#/PageParam"
            - $ref: "../components/parameters.yaml#/LimitParam"
            - name: level
              in: query
              description: Filter by event severity level
              schema:
                  type: string
                  enum: [debug, info, warning, error, critical]
              example: "error"
            - name: category
              in: query
              description: Filter by event category
              schema:
                  type: string
                  enum: [authentication, authorization, system, security, audit]
              example: "security"
            - name: start_date
              in: query
              description: Filter events after this date (ISO 8601)
              schema:
                  type: string
                  format: date-time
              example: "2024-01-01T00:00:00Z"
            - name: end_date
              in: query
              description: Filter events before this date (ISO 8601)
              schema:
                  type: string
                  format: date-time
              example: "2024-01-31T23:59:59Z"
        responses:
            "200":
                description: System event logs
                content:
                    application/json:
                        schema:
                            $ref: "../schemas/admin.yaml#/SystemEventLogResponse"
            "401":
                $ref: "../components/responses.yaml#/Unauthorized"
            "403":
                $ref: "../components/responses.yaml#/Forbidden"

config:
    get:
        tags:
            - Admin
        summary: Get system configuration (admin)
        description: Get current system configuration settings (sensitive values redacted)
        operationId: getSystemConfig
        security:
            - bearerAuth: []
        responses:
            "200":
                description: System configuration
                content:
                    application/json:
                        schema:
                            allOf:
                                - $ref: "../schemas/common.yaml#/ApiResponse"
                                - type: object
                                  properties:
                                      data:
                                          type: object
                                          description: Configuration settings (structure varies)
                                          example:
                                              auth:
                                                  session_timeout: 3600
                                                  max_failed_attempts: 5
                                              security:
                                                  require_mfa: false
                                                  password_min_length: 12
            "401":
                $ref: "../components/responses.yaml#/Unauthorized"
            "403":
                $ref: "../components/responses.yaml#/Forbidden"

    patch:
        tags:
            - Admin
        summary: Update system configuration (admin)
        description: |
            Update system configuration settings. Changes take effect immediately.
            This action is logged with justification.
        operationId: updateSystemConfig
        security:
            - bearerAuth: []
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        $ref: "../schemas/admin.yaml#/ConfigurationUpdate"
        responses:
            "200":
                description: Configuration updated successfully
                content:
                    application/json:
                        schema:
                            allOf:
                                - $ref: "../schemas/common.yaml#/ApiResponse"
                                - type: object
                                  properties:
                                      data:
                                          type: object
                                          properties:
                                              message:
                                                  type: string
                                                  example: "Configuration updated successfully"
                                              setting:
                                                  type: string
                                                  example: "auth.session_timeout"
                                              old_value:
                                                  example: 3600
                                              new_value:
                                                  example: 7200
            "400":
                $ref: "../components/responses.yaml#/BadRequest"
            "401":
                $ref: "../components/responses.yaml#/Unauthorized"
            "403":
                $ref: "../components/responses.yaml#/Forbidden"

backup:
    post:
        tags:
            - Admin
        summary: Create system backup (admin)
        description: |
            Create encrypted backup of system data including users, roles, OAuth clients, 
            and configurations. Returns temporary download URL. Backups expire after 24 hours.
        operationId: createBackup
        security:
            - bearerAuth: []
        requestBody:
            required: true
            content:
                application/json:
                    schema:
                        $ref: "../schemas/admin.yaml#/BackupRequest"
        responses:
            "200":
                description: Backup created successfully
                content:
                    application/json:
                        schema:
                            allOf:
                                - $ref: "../schemas/common.yaml#/ApiResponse"
                                - type: object
                                  properties:
                                      data:
                                          $ref: "../schemas/admin.yaml#/BackupResponse"
            "400":
                $ref: "../components/responses.yaml#/BadRequest"
            "401":
                $ref: "../components/responses.yaml#/Unauthorized"
            "403":
                $ref: "../components/responses.yaml#/Forbidden"
            "500":
                description: Backup creation failed
                content:
                    application/json:
                        schema:
                            $ref: "../components/responses.yaml#/InternalServerError"
